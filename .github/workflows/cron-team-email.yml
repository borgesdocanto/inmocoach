name: Cron — team-email

# Lunes 12:30 UTC = 09:30 ARG — Resumen del equipo al broker
on:
  schedule:
    - cron: "30 12 * * 1"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar team-email
        run: |
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "https://www.inmocoach.com.ar/api/github-cron/team-email" \
            -H "Authorization: Bearer ${{ secrets.SYSTEME_CRON_TOKEN }}" \
            --max-time 290)
          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::team-email falló con HTTP $HTTP_CODE"
            exit 1
          fi
