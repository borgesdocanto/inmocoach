name: Cron — trial-emails

# Diario 14:00 UTC = 11:00 ARG — Emails a usuarios trial
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar trial-emails
        run: |
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "https://www.inmocoach.com.ar/api/cron/trial-emails" \
            -H "Authorization: Bearer ${{ secrets.SYSTEME_CRON_TOKEN }}" \
            --max-time 290)
          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::trial-emails falló con HTTP $HTTP_CODE"
            exit 1
          fi
