name: Cron — weekly-email

# Lunes 12:00 UTC = 09:00 ARG — Informe semanal del agente
on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar weekly-email
        run: |
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "https://www.inmocoach.com.ar/api/github-cron/weekly-email" \
            -H "Authorization: Bearer ${{ secrets.SYSTEME_CRON_TOKEN }}" \
            --max-time 290)
          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::weekly-email falló con HTTP $HTTP_CODE"
            exit 1
          fi
