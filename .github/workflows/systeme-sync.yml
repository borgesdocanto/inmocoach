name: Systeme Sync Diario

on:
  schedule:
    # 12:30 UTC = 09:30 Argentina, todos los días
    - cron: "30 12 * * *"
  workflow_dispatch: {} # permite dispararlo manualmente desde la UI de GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar sincronización Tokko → Systeme
        run: |
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://www.inmocoach.com.ar/api/systeme/run-all" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SYSTEME_CRON_TOKEN }}" \
            --max-time 280)
          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Sync falló con HTTP $HTTP_CODE"
            exit 1
          fi
