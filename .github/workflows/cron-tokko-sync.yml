name: Cron — tokko-sync

# Diario 04:00 UTC = 01:00 ARG — Sync propiedades Tokko
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar tokko-sync
        run: |
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "https://www.inmocoach.com.ar/api/github-cron/tokko-sync" \
            -H "Authorization: Bearer ${{ secrets.SYSTEME_CRON_TOKEN }}" \
            --max-time 290)
          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::tokko-sync falló con HTTP $HTTP_CODE"
            exit 1
          fi
