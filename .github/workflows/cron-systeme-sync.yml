name: Cron — systeme-sync

# Sincronización Tokko → Systeme.io para todos los teams activos
on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar systeme-sync
        run: |
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://www.inmocoach.com.ar/api/systeme/run-all" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SYSTEME_CRON_TOKEN }}" \
            --max-time 290)
          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::systeme-sync falló con HTTP $HTTP_CODE"
            exit 1
          fi
