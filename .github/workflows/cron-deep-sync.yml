name: Cron — deep-sync

# Domingo 03:00 UTC = sábado 24:00 ARG — Sync profundo
on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar deep-sync
        run: |
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "https://www.inmocoach.com.ar/api/github-cron/deep-sync" \
            -H "Authorization: Bearer ${{ secrets.SYSTEME_CRON_TOKEN }}" \
            --max-time 290)
          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::deep-sync falló con HTTP $HTTP_CODE"
            exit 1
          fi
