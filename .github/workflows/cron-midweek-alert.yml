name: Cron — midweek-alert

# Miércoles 21:00 UTC = 18:00 ARG — Alerta mitad de semana
on:
  schedule:
    - cron: "0 21 * * 3"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar midweek-alert
        run: |
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "https://www.inmocoach.com.ar/api/github-cron/midweek-alert" \
            -H "Authorization: Bearer ${{ secrets.SYSTEME_CRON_TOKEN }}" \
            --max-time 290)
          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::midweek-alert falló con HTTP $HTTP_CODE"
            exit 1
          fi
