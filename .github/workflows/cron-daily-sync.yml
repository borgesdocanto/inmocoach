name: Cron — daily-sync

# Diario 20:00 UTC = 17:00 ARG — Sync calendario
on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar daily-sync
        run: |
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "https://www.inmocoach.com.ar/api/github-cron/daily-sync" \
            -H "Authorization: Bearer ${{ secrets.SYSTEME_CRON_TOKEN }}" \
            --max-time 290)
          echo "HTTP $HTTP_CODE"
          cat /tmp/resp.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::daily-sync falló con HTTP $HTTP_CODE"
            exit 1
          fi
